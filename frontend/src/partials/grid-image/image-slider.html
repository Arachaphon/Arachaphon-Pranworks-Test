<div x-data="imageSlider" class="relative select-none">
  <div class="relative overflow-hidden rounded-xl border border-gray-200 dark:border-gray-800 px-1">
    <div x-ref="track" class="flex" :style="transformStyle">
      <template x-for="(slide, index) in slides" :key="index">
        <div class="flex-shrink-0 w-1/3 px-2.5">
          <img
            :src="slide.src"
            :alt="slide.alt"
            class="w-full rounded-lg border border-gray-200 dark:border-gray-800 pointer-events-none"
          />
        </div>
      </template>
    </div>
  </div>

  <button
    @click="prev"
    :disabled="currentIndex === 0"
    :class="currentIndex === 0 ? 'opacity-40 cursor-not-allowed' : 'hover:bg-white dark:hover:bg-gray-700'"
    class="absolute left-2 top-1/2 -translate-y-1/2 z-10 flex h-10 w-10 items-center justify-center rounded-full bg-white/80 text-gray-700 shadow-md dark:bg-gray-800/80 dark:text-gray-300"
  >
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M15.25 6L9 12.25L15.25 18.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <button
    @click="next"
    :disabled="currentIndex === maxIndex"
    :class="currentIndex === maxIndex ? 'opacity-40 cursor-not-allowed' : 'hover:bg-white dark:hover:bg-gray-700'"
    class="absolute right-2 top-1/2 -translate-y-1/2 z-10 flex h-10 w-10 items-center justify-center rounded-full bg-white/80 text-gray-700 shadow-md dark:bg-gray-800/80 dark:text-gray-300"
  >
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M8.75 19L15 12.75L8.75 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="mt-4 flex items-center justify-center gap-2">
    <template x-for="(slide, i) in slides" :key="i">
      <button
        @click="goTo(i)"
        :class="currentIndex === i ? 'bg-brand-500 w-6' : 'bg-gray-300 w-2.5 dark:bg-gray-600'"
        class="h-2.5 rounded-full transition-all duration-300"
      ></button>
    </template>
  </div>
</div>
