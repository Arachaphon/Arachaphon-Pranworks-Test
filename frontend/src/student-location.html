<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Student Location | TailAdmin</title>
  </head>
  <body
    x-data="{ page: 'studentLocation', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <include src="./partials/preloader.html"></include>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <include src="./partials/sidebar.html"></include>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden"
      >
        <!-- Small Device Overlay Start -->
        <include src="./partials/overlay.html" />
        <!-- Small Device Overlay End -->

        <!-- ===== Header Start ===== -->
        <include src="./partials/header.html" />
        <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main>
          <div class="mx-auto max-w-(--breakpoint-2xl) p-4 md:p-6" x-data="studentLocation">
            <!-- Breadcrumb Start -->
            <div x-data="{ pageName: `Student Location`}">
              <include src="./partials/breadcrumb.html" />
            </div>
            <!-- Breadcrumb End -->

            <div class="grid grid-cols-12 gap-4 md:gap-6">
              <div class="col-span-12">
                <div
                  class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] sm:p-6"
                >
                  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between">
                    <div>
                      <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">
                        ตำแหน่งสถานที่ตั้งของนักศึกษา
                      </h3>
                      <p class="mt-1 text-theme-sm text-gray-500 dark:text-gray-400">
                        แสดงตำแหน่งปัจจุบันผ่าน Geolocation API
                      </p>
                    </div>

                    <button
                      @click="refreshLocation"
                      class="mt-3 sm:mt-0 inline-flex items-center gap-2 rounded-lg bg-brand-500 px-4 py-2.5 text-theme-sm font-medium text-white hover:bg-brand-600"
                    >
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 4V1L8 5L12 9V6C15.31 6 18 8.69 18 12C18 13.01 17.75 13.97 17.3 14.8L18.76 16.26C19.54 15.03 20 13.57 20 12C20 7.58 16.42 4 12 4ZM12 18C8.69 18 6 15.31 6 12C6 10.99 6.25 10.03 6.7 9.2L5.24 7.74C4.46 8.97 4 10.43 4 12C4 16.42 7.58 20 12 20V23L16 19L12 15V18Z" fill="currentColor"/>
                      </svg>
                      รีเฟรชตำแหน่ง
                    </button>
                  </div>

                  <!-- Loading State -->
                  <div x-show="loading" class="my-8 flex flex-col items-center justify-center">
                    <svg class="animate-spin h-10 w-10 text-brand-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <p class="text-gray-500 dark:text-gray-400">กำลังค้นหาตำแหน่งของคุณ...</p>
                  </div>

                  <!-- Error State -->
                  <div x-show="error" class="my-8 rounded-lg bg-red-50 p-4 text-center dark:bg-red-500/10">
                    <p class="text-red-600 dark:text-red-400" x-text="error"></p>
                    <button
                      @click="refreshLocation"
                      class="mt-3 inline-flex items-center gap-2 rounded-lg bg-red-500 px-4 py-2 text-theme-sm font-medium text-white hover:bg-red-600"
                    >
                      ลองอีกครั้ง
                    </button>
                  </div>

                  <!-- Coordinates Info -->
                  <div x-show="!loading && !error" class="mt-5 grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="rounded-xl bg-gray-50 p-4 dark:bg-gray-900">
                      <p class="text-theme-xs text-gray-500 dark:text-gray-400">ละติจูด</p>
                      <p class="mt-1 text-theme-lg font-semibold text-gray-800 dark:text-white/90" x-text="lat"></p>
                    </div>
                    <div class="rounded-xl bg-gray-50 p-4 dark:bg-gray-900">
                      <p class="text-theme-xs text-gray-500 dark:text-gray-400">ลองจิจูด</p>
                      <p class="mt-1 text-theme-lg font-semibold text-gray-800 dark:text-white/90" x-text="lng"></p>
                    </div>
                    <div class="rounded-xl bg-gray-50 p-4 dark:bg-gray-900">
                      <p class="text-theme-xs text-gray-500 dark:text-gray-400">ความแม่นยำ</p>
                      <p class="mt-1 text-theme-lg font-semibold text-gray-800 dark:text-white/90" x-text="accuracy + ' ม.'"></p>
                    </div>
                  </div>

                  <!-- Map Container -->
                  <div x-show="!loading && !error" class="mt-5">
                    <div
                      id="studentMap"
                      class="h-[400px] w-full rounded-xl border border-gray-200 dark:border-gray-700"
                    ></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
  </body>
</html>
